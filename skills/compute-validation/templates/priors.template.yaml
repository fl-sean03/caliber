# priors.yaml — failure-pattern catalog for <project>
#
# Lives at <project>/.priors.yaml or simulations/.priors.yaml.
# Loaded by the compute-validation skill during Layer A (physics verification)
# and Layer A' (orchestration safety). Each verification: extract characteristics
# of the current campaign, evaluate every pattern's `matches` rules against them,
# surface matches in VERIFICATION.md / ORCHESTRATION_CHECK.md, and apply
# mitigations for high/critical-severity matches.
#
# ============================================================================
# How to think about this catalog
# ============================================================================
#
# Priors are SEEDS for agent reasoning, not exhaustive checklists. The exact
# `matches` predicates only fire for cases we've literally seen before. The
# `related_questions` and `generalization` fields are what make a prior useful
# on NOVEL cases — they turn a single past incident into a transferable lesson.
#
# When verifying a new campaign, the agent should:
#   1. Run exact `matches` against the campaign (fast tier, cheap).
#   2. For near-misses or unfamiliar territory, READ the `related_questions`
#      on each prior and ask them about the current setup.
#   3. Internalize the `generalization` so the principle (not just the case)
#      transfers to new domains.
#
# A prior that only fires on exact match is dead weight after one campaign.
# A prior with rich related_questions + generalization is a reasoning amplifier
# that pays for itself across dozens of campaigns.
#
# ============================================================================
# Field: `class`
# ============================================================================
#
# Every prior has a `class` that tells the agent which validation layer should
# surface it:
#
#   - physics       — failures in scientific correctness (config content,
#                     parameters, numerics, physical regime). Surfaced by
#                     Layer A (workflows/verification.md).
#   - orchestration — failures in scripts, submission, chain dynamics,
#                     automation, notification storms, self-propagation
#                     runaways. Surfaced by Layer A'
#                     (workflows/orchestration-safety.md).
#   - hybrid        — both layers care. Example: a walltime estimate is wrong
#                     (physics) AND the chain has no protection against
#                     repeated walltime cliffs (orchestration).
#
# ============================================================================
# Field: `related_questions`
# ============================================================================
#
# A short list of reasoning prompts the agent should ask if exact `matches`
# doesn't fire. These prompts are how priors stay useful when the next campaign
# diverges in surface details but shares structural risk. Write them as the
# question a reviewer would ask, not as assertions.
#
# Good: "Could this submission's first-failure trigger compounding within
#        the queue cooldown window?"
# Bad:  "Check that nothing self-propagates."
#
# ============================================================================
# Field: `generalization`
# ============================================================================
#
# A short multi-line block stating the broader principle behind the specific
# case. The case is what was observed; the generalization is what an agent
# should carry into future work. Write it so a future agent can apply it to a
# different tool, different cluster, different domain.
#
# Example: the specific case might be "NAMD slab NPT without useConstantArea
# collapses vacuum." The generalization is "any anisotropic geometry under
# isotropic barostat behaves pathologically; check that ensemble-specific
# constraints match the geometry."
#
# ============================================================================

version: 1
project: <project-name>
last_updated: YYYY-MM-DD

patterns:
  # --- Example 1: physics prior, caught at verification time -----------------
  - id: namd-velocity-limit-on-short-minimization
    name: NAMD "atom velocity > limit" from too-short minimization
    description: |
      NAMD throws "atom velocity v=NNNN > limit" early in a run when the system
      starts with high-energy clashes that minimization didn't fully relax.
      The crash is deterministic at the same step count for a given seed.
    class: physics
    matches:
      tool: namd
      minimize_steps: { lt: 5000 }
      has_solvent: true
    related_questions:
      - "Is the starting structure freshly built or inherited from a relaxed
         end-state? If freshly built, is the minimization budget proportional
         to the expected clash density?"
      - "If the system has been packed (e.g. Packmol), are the inter-molecule
         distances large enough that minimization can resolve them within the
         step budget?"
      - "Does the integrator step size compound the problem? (Larger dt makes
         residual high-energy contacts more lethal on step 1.)"
      - "Is there a heating ramp between minimization and production? If not,
         the first integrator step assigns velocities for the system's full
         target temperature against a partially-minimized potential."
    risk_class: high
    layer_caught: smoke
    indicators:
      - "FATAL ERROR: Atom NNNN velocity"
      - "early crash within first ~100 steps"
    mitigation:
      - "Increase minimize from 1000 to 10000 steps in the production config"
      - "If still crashes: consider a heating phase before production"
    rationale: |
      Short minimization leaves residual high-energy contacts. The first
      integrator step then assigns velocities consistent with that potential
      energy, which exceeds NAMD's velocity-limit safety threshold.
    generalization: |
      Any explicit-integrator scheme is sensitive to the residual potential
      energy at step 0. If the starting structure is not at (or near) a local
      minimum of the FF used for production, the first step's velocity
      assignment can violate stability bounds. The lesson generalizes to any
      MD engine, ML potential, or QM/MM scheme: a minimization budget should
      scale with the build-method's expected clash density, not be a fixed
      template value.
    references:
      - "campaigns/2026-04-12-cubic-npt/SMOKE_ANALYSIS_002.md"
    discovered: 2026-04-12
    last_observed: 2026-04-13
    incidents: ["12345678", "12345692"]

  # --- Example 2: physics prior, geometry-specific ---------------------------
  - id: slab-npt-needs-useConstantArea
    name: NPT on slab without useConstantArea collapses vacuum gap
    description: |
      Running NAMD NPT on a slab geometry (vacuum gap in z) without
      `useConstantArea yes` lets the barostat compress the cell isotropically,
      which collapses the vacuum gap and drives density unphysically high.
      Symptom: density rising monotonically through smoke; if production
      proceeds, by ~20 ns the vacuum is gone and self-image artifacts
      dominate.
    class: physics
    matches:
      geometry: slab
      ensemble: npt
      useConstantArea: { in: [false, "no", null] }
    related_questions:
      - "Is the box anisotropic in any other way that the chosen barostat
         doesn't account for? (Hexagonal cells, tilted boxes, non-orthogonal
         lattices.)"
      - "Does the barostat coupling time make sense for the (much smaller)
         compressible volume, given that part of the box is vacuum?"
      - "If `useConstantArea` is set, what's the assumed lateral lattice
         constant? If the slab was built with a strained lateral spacing, the
         constraint freezes that strain."
      - "For non-NAMD MD engines: does the equivalent flag exist? (LAMMPS
         `fix npt z`, GROMACS `pcoupltype=semiisotropic`, etc.)"
    risk_class: critical
    layer_caught: verification
    indicators:
      - "density slope > 0.005 g/cm^3/ns in smoke"
      - "z-extent shrinking each restart"
    mitigation:
      - "Set `useConstantArea yes` in the NPT config"
      - "Verify post-fix that density slope returns to ~0 within smoke noise"
    rationale: |
      `useConstantArea yes` constrains the barostat to scale only the z
      direction, preserving the xy slab cross-section and the vacuum gap.
      Without it, the barostat sees an effectively low-density box (because
      of the vacuum) and compresses it.
    generalization: |
      Any anisotropic geometry under an isotropic barostat behaves
      pathologically. Whenever the simulation cell is partitioned into regions
      with different "effective compressibility" (vacuum vs. condensed phase,
      solvent vs. crystal), the ensemble must include constraints that respect
      that partition. The lesson generalizes to slabs, interfaces, channels,
      cavity-containing boxes, and any low-dimensional periodicity. Whenever
      the agent sees a non-cubic system + NPT, the first question should be
      "does the barostat respect the geometry?"
    references:
      - "compute-validation/workflows/verification.md (worked example)"
    discovered: 2026-05-06
    last_observed: 2026-05-06
    incidents: []

  # --- Example 3: orchestration prior, the SLURM runaway pattern -------------
  - id: slurm-runaway-resubmit-mail-flood
    name: In-script sbatch resubmit + fast-fail + mail-type → runaway + email flood
    description: |
      A submit script that auto-resubmits on failure (e.g. trailing
      `|| sbatch ...` or an unconditional in-script `sbatch` after the
      simulation) combined with a simulation that can fail in seconds AND
      `--mail-type=END,FAIL` produces a runaway loop. Each fast failure
      submits the next job within seconds, the next one fails again, etc.
      Real incident: 8,366 jobs submitted and 16,000+ emails generated before
      the loop was caught manually. The simulation bug was a typo; the
      orchestration bug was the absence of every circuit breaker.
    class: orchestration
    matches:
      has_in_script_resubmit: true
      has_mail_type_END_or_FAIL: true
      can_fail_in_seconds: true
    related_questions:
      - "Could this submission's first-fail happen fast enough to compound
         before anyone notices? (Order of seconds vs. order of hours.)"
      - "What other self-propagating actions exist in the workflow that
         could co-trigger? (Array specs, cron jobs, watchdogs, dependency
         chains.)"
      - "If failures happen at the maximum sustainable rate for one hour,
         what's the total impact? (Submissions, emails, GPU-hours,
         allocation hit.)"
      - "Is there ANY counter, rate cap, or kill switch on the
         self-propagation path? If not, this is unsafe regardless of how
         confident you are in the simulation config."
      - "If the simulation crashes pre-emptively (e.g. license server down,
         scratch full, GPU init fail), does the resubmit pattern make the
         situation worse by hammering the cluster?"
    risk_class: critical
    layer_caught: production
    indicators:
      - "squeue count climbing without bound"
      - "thousands of emails in inbox over short window"
      - "cluster admin notification (you're spamming the scheduler)"
    mitigation:
      - "Replace in-script resubmit with pre-chained submission: queue all N
         follow-up jobs upfront with explicit `--dependency=afterany:$PREV`
         deps. The chain is bounded at submit time, not driven by runtime
         behavior."
      - "Remove `--mail-type=END,FAIL` from chain links; keep mail-type only
         on the explicit final-completion job."
      - "Add a bounded iteration counter file (`iter_count.txt`); chain links
         check it and exit-early past a configured ceiling."
      - "If retaining any auto-resubmit path: use a signal-trap pattern
         (`#SBATCH --signal=B:USR1@<sec>` + bash trap) instead of trailing
         resubmit, so the resubmit fires only on graceful pre-walltime exit,
         not on every failure."
      - "Consider rate ceiling: if your scheduler supports
         `--begin=now+5min`, use it on chain links to prevent <5 min
         compounding."
    rationale: |
      Self-propagating actions need explicit boundaries. Trusting the
      simulation to "not fail" is not a boundary; trusting the resubmit to
      "fire only on the right failures" is not a boundary; trusting yourself
      to "notice the runaway in time" is not a boundary. The four guardrails
      below are the boundaries.
    generalization: |
      Any action that can spawn another action (in-script sbatch, array
      submission, cron job, watchdog script, webhook trigger, recursive
      agent, file-watcher pipeline) needs four guardrails:

        1. Bounded counter — a hard iteration limit. Chain cannot exceed N
           total spawns, period.
        2. Rate ceiling — maximum spawns per minute/hour. Prevents
           fast-fail explosion even if the counter is high.
        3. Failure ceiling — maximum consecutive failures before the chain
           halts. Distinct from total count: a chain that fails 10x in a
           row is in trouble regardless of remaining budget.
        4. Notification cap — maximum emails/Slacks/webhooks per time
           window. A flood of "FAILED" notifications is itself a failure
           mode (operator fatigue, spam filters, paging burnout).

      This four-guardrails principle generalizes far beyond SLURM:
        - Vast.ai auto-restart loops (CCM): same four
        - Kubernetes job retry policies: same four
        - Agent-spawning loops (LangGraph, agent supervisors): same four
        - GitHub Actions matrix retries: same four
        - APIs with retry decorators: same four

      Whenever an agent sees self-propagation, the first question is "which
      of the four guardrails is missing?" If the answer isn't "none," think
      harder.
    references:
      - "<path-to-postmortem-of-runaway-incident>.md"
      - "compute-validation/workflows/orchestration-safety.md"
    discovered: 2026-05-10
    last_observed: 2026-05-10
    incidents: ["<job-id-range>"]

  # Schema reference for new entries:
  #
  # - id: <unique-slug>            # required; stable identifier
  #   name: <short human label>
  #   description: |               # one paragraph; what the failure looks like
  #     ...
  #   class: physics | orchestration | hybrid
  #   matches:                     # predicates the agent evaluates (exact tier)
  #     <key>: <exact-value>       # equality
  #     <key>: { lt: <value> }     # less-than
  #     <key>: { gt: <value> }     # greater-than
  #     <key>: { in: [<list>] }    # membership
  #   related_questions:           # reasoning prompts for novel-case use
  #     - "<question to ask if exact match doesn't fire>"
  #     - "<question to ask if exact match doesn't fire>"
  #   risk_class: low | medium | high | critical
  #   layer_caught: verification | smoke | production | orchestration | none-yet
  #   indicators:                  # signals an agent can grep/extract
  #     - <signal-or-string>
  #   mitigation:                  # concrete actions; first one is preferred
  #     - <action>
  #   rationale: |                 # why the mitigation works (case-specific)
  #     ...
  #   generalization: |            # the broader principle (transfers to new cases)
  #     ...
  #   references:                  # paths or URLs
  #     - <path-or-url>
  #   discovered: YYYY-MM-DD       # date this pattern was added
  #   last_observed: YYYY-MM-DD    # most-recent campaign that triggered it
  #   incidents:                   # job IDs or campaign slugs that hit it
  #     - <id-or-slug>
